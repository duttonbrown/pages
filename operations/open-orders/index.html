<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Orders — Dutton Brown</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Design tokens ──────────────────────────────────────────────────────── */
:root {
  --border:     #e9e9e7;
  --header-bg:  #f7f6f3;
  --text:       #37352f;
  --muted:      #9b9a97;
  --accent:     #d97706;   /* amber — Orders + Expedites */
  --sub-text:   #37352f;
  --page-bg:    #ffffff;
}

@media (prefers-color-scheme: dark) {
  :root {
    --border:     #373737;
    --header-bg:  #252525;
    --text:       rgba(255, 255, 255, 0.82);
    --muted:      #787774;
    --accent:     #ff9912;
    --sub-text:   rgba(255, 255, 255, 0.82);
    --page-bg:    #191919;
  }
}

/* ── Base ───────────────────────────────────────────────────────────────── */
body {
  font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
  background: var(--page-bg);
  padding: 0;
  margin: 0;
  -webkit-font-smoothing: antialiased;
}

/* ── Widget shell ───────────────────────────────────────────────────────── */
.widget {
  max-width: 820px;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}

/* ── Header ─────────────────────────────────────────────────────────────── */
.w-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 14px;
  background: var(--header-bg);
  border-bottom: 1px solid var(--border);
  gap: 8px;
}

.w-title {
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--text);
  white-space: nowrap;
}

.w-ts {
  font-size: 10px;
  color: var(--muted);
  white-space: nowrap;
}

/* ── Tile grids ─────────────────────────────────────────────────────────── */
.row1 {
  display: grid;
  grid-template-columns: 1fr 1.45fr 1.45fr 0.9fr 1.1fr;
}

.row2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-top: 1px solid var(--border);
}

/* ── Individual tile ─────────────────────────────────────────────────────── */
.tile {
  padding: 12px 14px 13px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.tile:last-child { border-right: none; }

.t-label {
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.t-big {
  font-size: 2rem;
  font-weight: 600;
  line-height: 1;
  color: var(--text);
  margin-bottom: 5px;
}
.t-big.accent { color: var(--accent); }

.t-unit {
  font-size: 0.95rem;
  font-weight: 400;
  color: var(--muted);
  margin-left: 1px;
}

.t-sub {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  line-height: 1.65;
  gap: 6px;
}
.sl { color: var(--muted); white-space: nowrap; }
.sv { color: var(--sub-text); font-weight: 500; }

.t-note {
  font-size: 9.5px;
  color: var(--muted);
  margin-top: 3px;
}

/* ── Responsive: narrow Notion columns ──────────────────────────────────── */
@media (max-width: 620px) {
  .t-big   { font-size: 1.5rem; }
  .t-sub   { font-size: 10px; }
  .tile    { padding: 10px 10px 11px; }
}

@media (max-width: 460px) {
  .row1 {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto auto;
  }
  .tile-orders  { grid-column: 1; grid-row: 1; }
  .tile-expd    { grid-column: 2; grid-row: 1; }
  .tile-lighting{ grid-column: 1; grid-row: 2; }
  .tile-hardware{ grid-column: 2; grid-row: 2; }
  .tile-value   { grid-column: 1 / 3; grid-row: 3; border-right: none; }
}
</style>
</head>
<body>

<div class="widget">

  <!-- Header -->
  <div class="w-header">
    <span class="w-title">Open Orders</span>
    <span class="w-ts" id="ts">Loading…</span>
  </div>

  <!-- Row 1: 5 KPI tiles -->
  <div class="row1">

    <div class="tile tile-orders">
      <div class="t-label">Orders</div>
      <div class="t-big accent" id="v-orders">—</div>
      <div class="t-note">unfulfilled + partial</div>
    </div>

    <div class="tile tile-lighting">
      <div class="t-label">Lighting</div>
      <div class="t-big" id="v-ltotal">—</div>
      <div class="t-sub"><span class="sl">Non-color</span><span class="sv" id="v-lnc">—</span></div>
      <div class="t-sub"><span class="sl">Color</span><span class="sv" id="v-lc">—</span></div>
    </div>

    <div class="tile tile-hardware">
      <div class="t-label">Hardware</div>
      <div class="t-big" id="v-htotal">—</div>
      <div class="t-sub"><span class="sl">Non-color</span><span class="sv" id="v-hnc">—</span></div>
      <div class="t-sub"><span class="sl">Color</span><span class="sv" id="v-hc">—</span></div>
    </div>

    <div class="tile tile-expd">
      <div class="t-label">Expedites</div>
      <div class="t-big accent" id="v-expd">—</div>
      <div class="t-note">tagged rush</div>
    </div>

    <div class="tile tile-value">
      <div class="t-label">Open Value</div>
      <div class="t-big" id="v-value">—</div>
      <div class="t-note">total unfulfilled</div>
    </div>

  </div><!-- /row1 -->

  <!-- Row 2: queue health tiles -->
  <div class="row2">

    <div class="tile">
      <div class="t-label">Oldest Open Order</div>
      <div class="t-big"><span id="v-oldest">—</span><span class="t-unit"> days</span></div>
      <div class="t-note">since placed</div>
    </div>

    <div class="tile">
      <div class="t-label">Avg Days to Fulfill</div>
      <div class="t-big"><span id="v-avg">—</span><span class="t-unit"> days</span></div>
      <div class="t-note">last 30 fulfilled orders</div>
    </div>

  </div><!-- /row2 -->

</div><!-- /widget -->

<script>
// data.json lives alongside index.html in the pages repo
const DATA_URL = "./data.json";

function set(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = (val != null) ? String(val) : "—";
}

function money(n) {
  if (n == null) return "—";
  if (n >= 1e6) return "$" + (n / 1e6).toFixed(1) + "M";
  if (n >= 1e3) return "$" + Math.round(n / 1e3) + "k";
  return "$" + Math.round(n);
}

function dec1(n) {
  return (n != null) ? n.toFixed(1) : "—";
}

function fmtTs(iso) {
  try {
    return "Updated " + new Date(iso).toLocaleString("en-US", {
      month: "short", day: "numeric",
      hour: "numeric", minute: "2-digit",
      timeZone: "America/Chicago",
      timeZoneName: "short",
    });
  } catch { return iso; }
}

async function load() {
  // Cache-bust once per minute so Notion's iframe doesn't serve stale data
  const bust = Math.floor(Date.now() / 60000);
  try {
    const r = await fetch(`${DATA_URL}?v=${bust}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();

    document.getElementById("ts").textContent = fmtTs(d.updated_at);

    set("v-orders", d.order_count);
    set("v-ltotal", d.lighting?.total);
    set("v-lnc",    d.lighting?.non_color);
    set("v-lc",     d.lighting?.color);
    set("v-htotal", d.hardware?.total);
    set("v-hnc",    d.hardware?.non_color);
    set("v-hc",     d.hardware?.color);
    set("v-expd",   d.expedites);
    set("v-value",  money(d.open_value));
    set("v-oldest", d.oldest_order_days);
    set("v-avg",    dec1(d.avg_days_to_fulfill));

  } catch (err) {
    document.getElementById("ts").innerHTML =
      '<span style="color:var(--muted)">⚠ Unable to load — showing last known data</span>';
    console.warn("open-orders: fetch failed", err);
  }
}

load();
// Auto-refresh every 5 minutes without a page reload
setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
